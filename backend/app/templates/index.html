<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Files</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- DataTables CSS -->
  <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h1 class="mb-0">Cyfora GenAI prompt tester : Available Files</h1>

    <!-- Upload button triggers modal -->
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#uploadModal">
      <i class="bi bi-upload"></i> Upload File
    </button>
  </div>

  <table id="filesTable" class="table table-striped table-bordered">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Size (bytes)</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- Upload Modal -->
<div class="modal fade" id="uploadModal" tabindex="-1" aria-labelledby="uploadModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <form id="uploadForm" class="modal-content" enctype="multipart/form-data">
      <div class="modal-header">
        <h5 class="modal-title" id="uploadModalLabel">Upload a File</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">
        <div class="mb-3">
          <label for="fileInput" class="form-label">Choose file</label>
          <input type="file" class="form-control" id="fileInput" name="file" required>
          <div class="form-text">Max size enforced by server configuration.</div>
        </div>
        <div id="uploadAlert" class="alert d-none" role="alert"></div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary">Upload</button>
      </div>
    </form>
  </div>
</div>

<!-- jQuery (required by DataTables) -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- DataTables JS -->
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<!-- Optional Bootstrap Icons for button icon -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<script>
  let dt;

  function refreshTable() {
    dt.ajax.reload(null, false); // keep current page
  }

  $(document).ready(function () {
    dt = $('#filesTable').DataTable({
      ajax: {
        url: '/api/files',
        dataSrc: '' // API returns an array
      },
      columns: [
        { data: 'id' },
        { data: 'name' },
        { data: 'size' },
        { data: null,
          orderable: false,
          searchable: false,
          className: 'text-center',
          render: function (data, type, row) {
            // Button links to the download route using the file's UUID
            return `
              <a class="btn btn-sm btn-outline-primary" href="/api/download/${row.id}"><i class="bi bi-download"></i></a>
              <button class="btn btn-sm btn-outline-danger delete-btn" data-id="${row.id}"><i class="bi bi-trash"></i></button>

            `;
          }
        }
      ],
      responsive: true,
      pageLength: 10
    });

    // Handle upload form submission
    const form = document.getElementById('uploadForm');
    const alertBox = document.getElementById('uploadAlert');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.classList.add('d-none');

      const fileInput = document.getElementById('fileInput');
      if (!fileInput.files.length) {
        alertBox.textContent = 'Please select a file.';
        alertBox.className = 'alert alert-warning';
        alertBox.classList.remove('d-none');
        return;
      }

      const formData = new FormData();
      formData.append('file', fileInput.files[0]);

      try {
        const res = await fetch('/api/upload', {
          method: 'POST',
          body: formData
        });

        const json = await res.json();

        if (!res.ok) {
          alertBox.textContent = json.error || 'Upload failed';
          alertBox.className = 'alert alert-danger';
          alertBox.classList.remove('d-none');
          return;
        }

        // Success
        alertBox.textContent = 'File uploaded successfully.';
        alertBox.className = 'alert alert-success';
        alertBox.classList.remove('d-none');

        // Reset file input
        fileInput.value = '';
        // Close modal after a short delay and refresh the table
        setTimeout(() => {
          const modal = bootstrap.Modal.getInstance(document.getElementById('uploadModal'));
          modal.hide();
          refreshTable();
        }, 600);
      } catch (err) {
        alertBox.textContent = 'Unexpected error: ' + err;
        alertBox.className = 'alert alert-danger';
        alertBox.classList.remove('d-none');
      }
    });
  });
  
  
  $('#filesTable').on('click', '.delete-btn', async function () {
    const fileId = $(this).data('id');
    if (!confirm('Are you sure you want to delete this file?')) return;

    try {
      const res = await fetch(`/api/files/${fileId}`, { method: 'DELETE' });
      const json = await res.json();

      if (!res.ok) {
        alert(json.error || 'Delete failed');
        return;
      }

      alert('File deleted successfully');
      refreshTable();
    } catch (err) {
      alert('Unexpected error: ' + err);
    }
  });

</script>

</body>
